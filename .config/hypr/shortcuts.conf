hyprgrass-bind = , edge:d:u, exec, kill -34 $(ps -C wvkbd-mobintl)
hyprgrass-bind = , edge:u:d, exec, rnote
hyprgrass-bind = , swipe:2:u, exec, pkill -USR1 nwg-drawer
hyprgrass-bind = , swipe:2:d, killactive, 
hyprgrass-bind = , edge:r:l, workspace, +1
hyprgrass-bind = , edge:l:r, workspace, -1
hyprgrass-bindm = , longpress:2, movewindow

plugin {
    touch_gestures {
        edge_margin = 10
        sensitivity = 5.0
    }
    gestures {
        workspace_swipe = true
        workspace_swipe_cancel_ratio = 0.1
    }
}

bind = $mainMod SHIFT, S, exec, hyprshot -m region -o ~/Pictures/Screenshots 
bind = $mainMod SHIFT, W, exec, hyprshot -m window -o ~/Pictures/Screenshots
bind = $mainMod, Q, exec, $terminal
bind = CONTROL ALT, T, exec, $terminal "tmux"
bind = $mainMod SHIFT, Q, exec, $terminal -d ~/.config
bind = $mainMod, W, exec, $browser
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, S, togglesplit, # dwindle
bind = $mainMod ALT, B, exec, pkill blueman-manager || blueman-manager
bind = $mainMod, P, pin, 
bind = CONTROL SHIFT, escape, exec, kitty --class="btop" "btop"
bind = $mainMod ALT, L, exec, hyprlock

bind = $mainMod, F, cyclenext, floating
bind = $mainMod, T, cyclenext, tiled

# media player controls
bind = CONTROL ALT, P, exec, playerctl play-pause
bind = CONTROL ALT, N, exec, playerctl next
bind = CONTROL ALT, R, exec, playerctl previous

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ ; ~/.config/hypr/send_notification.sh volume
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- ; ~/.config/hypr/send_notification.sh volume
#showing the volume change in dunst

bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+; ~/.config/hypr/send_notification.sh brightness
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-; ~/.config/hypr/send_notification.sh brightness

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Lock on lid open
# bindl=,switch:on:Lid Switch, exec, hyprlock --immediate
# Lock lid on close
# bindl=,switch:off:Lid Switch, exec, hyprlock --immediate
bind = $mainMod SHIFT, B, exec, killall waybar ; waybar
bind = $mainMod SHIFT, D, exec, killall dunst ; dunst
bind = $mainMod, B, exec, killall -SIGUSR1 waybar

