
background {
    path = /home/szbence/Pictures/wallpaper/liquid1.jpg
}

label {
    monitor =

    font_size = 100
    text = cmd[update:1000] echo "<span foreground='##ffffff'>$TIME</span>"
    position = 0, 150
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 1.0) # no fill
    font_color = rgba(143, 143, 143, 1.0)

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color=rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg

    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}
