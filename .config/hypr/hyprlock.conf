label {
    monitor =
    font_size = 13  
    text = cmd[update:1000] playerctl metadata title
    position = 0, 20
    halign = center
    valign = center
    zindex = 1;
}
shape {
    monitor =
    size = 40, 40
    color = rgba(0, 0, 0, 1.0) # no fill
    position = 0, -70
    rounding = -1
    halign = center
    valign = center
    zindex = 0;
    border_size = 2
    border_color = rgba(0, 207, 230, 1.0)
    onclick = playerctl play-pause
}
label {
    monitor =
    font_size = 20  
    text = cmd[update:1000] playerctl status | sed -E 's/Paused/ /; s/Playing/ /; s/Stopped/ /'
    position = 0, -70
    halign = center
    valign = center
    zindex = 1;
}
